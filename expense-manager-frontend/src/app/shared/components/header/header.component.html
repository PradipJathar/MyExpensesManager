<mat-toolbar color="primary" class="header-toolbar">
  <button mat-icon-button (click)="onToggleSidebar()" class="toggle-btn" aria-label="Toggle Sidebar">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="brand-container" routerLink="/dashboard">
    <mat-icon class="brand-icon">auto_graph</mat-icon>
    <span class="brand-title">Antigravity Pay</span>
  </div>

  <span class="toolbar-spacer"></span>

  <div class="header-actions" *ngIf="currentUser$ | async as user">
    <!-- Notifications (Placeholder Badge) -->
    <button mat-icon-button class="action-btn" aria-label="Notifications">
      <mat-icon>notifications</mat-icon>
      <span class="badge">3</span>
    </button>

    <!-- Quick Settings Link -->
    <button mat-icon-button class="action-btn" routerLink="/settings/profile" aria-label="Settings">
      <mat-icon>settings</mat-icon>
    </button>

    <!-- User Profile Dropdown -->
    <button mat-button [matMenuTriggerFor]="profileMenu" class="user-profile-btn">
      <div class="avatar-circle">
        {{ user.firstName.charAt(0) }}{{ user.lastName.charAt(0) }}
      </div>
      <span class="user-fullname hide-mobile">{{ user.firstName }} {{ user.lastName }}</span>
      <mat-icon class="dropdown-chevron">expand_more</mat-icon>
    </button>

    <mat-menu #profileMenu="matMenu" xPosition="before" class="profile-dropdown-menu">
      <div class="menu-header">
        <p class="menu-user-name">{{ user.firstName }} {{ user.lastName }}</p>
        <p class="menu-user-email">{{ user.email }}</p>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/settings/profile">
        <mat-icon>account_circle</mat-icon>
        <span>My Profile</span>
      </button>
      <button mat-menu-item routerLink="/settings/change-password">
        <mat-icon>lock</mat-icon>
        <span>Change Password</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()" class="logout-menu-item">
        <mat-icon class="logout-icon">exit_to_app</mat-icon>
        <span>Sign Out</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
