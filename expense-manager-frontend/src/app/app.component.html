<div class="app-container" *ngIf="currentUser$ | async as user; else noAuth">
  <!-- Header with Sidebar toggle bindings -->
  <app-header (toggleSidebar)="isHandset ? sidenav.toggle() : toggleSidebar()"></app-header>

  <mat-sidenav-container class="sidenav-container">
    <!-- Sidebar matching desktop vs handset layouts -->
    <mat-sidenav #sidenav
                 [mode]="isHandset ? 'over' : 'side'"
                 [opened]="!isHandset"
                 [class.collapsed]="isSidebarCollapsed && !isHandset"
                 class="sidenav">
      <app-sidebar [isCollapsed]="isSidebarCollapsed && !isHandset"></app-sidebar>
    </mat-sidenav>

    <!-- Main Router Outlet Content area -->
    <mat-sidenav-content class="main-content">
      <div class="route-container">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>

<ng-template #noAuth>
  <div class="auth-wrapper">
    <router-outlet></router-outlet>
  </div>
</ng-template>

<!-- Global Loading Spinner Overlay -->
<div class="global-spinner-overlay" *ngIf="isLoading$ | async">
  <div class="spinner-container">
    <mat-spinner diameter="60" strokeWidth="5"></mat-spinner>
    <span class="loading-text">Loading...</span>
  </div>
</div>
