<div class="app-container" *ngIf="currentUser$ | async as user; else noAuth">
  <mat-toolbar color="primary" class="app-toolbar">
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="app-logo">Expense Manager</span>
    <span class="toolbar-spacer"></span>
    <button mat-button [matMenuTriggerFor]="profileMenu" class="user-menu-btn">
      <mat-icon>account_circle</mat-icon>
      <span class="user-name">{{ user.firstName }} {{ user.lastName }}</span>
    </button>
    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="side" opened class="sidenav">
      <mat-nav-list>
        <a mat-list-item routerLink="/expenses" routerLinkActive="active-nav">
          <mat-icon mat-list-icon>receipt</mat-icon>
          <span mat-line>Expenses</span>
        </a>
        <a mat-list-item routerLink="/budgets" routerLinkActive="active-nav">
          <mat-icon mat-list-icon>pie_chart</mat-icon>
          <span mat-line>Budgets</span>
        </a>
      </mat-nav-list>

    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <div class="route-container">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>

<ng-template #noAuth>
  <div class="auth-wrapper">
    <router-outlet></router-outlet>
  </div>
</ng-template>
